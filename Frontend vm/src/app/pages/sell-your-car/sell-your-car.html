<div class="form-box">
  <h1>Sell Your Car</h1>
  <p class="sub">Submit your vehicle details and we will contact you</p>

  <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>

  <form (ngSubmit)="submitVehicle()">
    <div class="input-group">
      <input type="text" name="fullname" [(ngModel)]="formData.fullname" placeholder="Full Name" required>
    </div>

    <div class="input-group">
      <input type="email" name="email" [(ngModel)]="formData.email" placeholder="Email Address" required>
    </div>

    <div class="input-group">
      <input type="text" name="phone" [(ngModel)]="formData.phone" placeholder="Phone Number" required>
    </div>

    <div class="input-group">
      <input type="text" name="make" [(ngModel)]="formData.make" placeholder="Car Make" required>
    </div>

    <div class="input-group">
      <input type="text" name="model" [(ngModel)]="formData.model" placeholder="Car Model" required>
    </div>

    <div class="input-group">
      <input type="text" name="year" [(ngModel)]="formData.year" placeholder="Year" required>
    </div>

    <div class="input-group">
      <input type="text" name="trim" [(ngModel)]="formData.trim" placeholder="Trim (optional)">
    </div>

    <div class="input-group">
      <input type="text" name="mileage" [(ngModel)]="formData.mileage" placeholder="Mileage" required>
    </div>

    <div class="input-group">
      <select name="condition" [(ngModel)]="formData.condition" required>
        <option value="">Select Condition</option>
        <option value="Excellent">Excellent</option>
        <option value="Good">Good</option>
        <option value="Fair">Fair</option>
        <option value="Needs Work">Needs Work</option>
      </select>
    </div>

    <div class="input-group">
      <input type="text" name="askingPrice" [(ngModel)]="formData.askingPrice" placeholder="Asking Price" required>
    </div>

    <div class="input-group">
      <textarea name="notes" [(ngModel)]="formData.notes" placeholder="Extra details about your vehicle"></textarea>
    </div>

    <button class="btn" type="submit" [disabled]="isLoading">
      {{ isLoading ? 'SUBMITTING...' : 'Submit Vehicle' }}
    </button>
  </form>
</div>
