<div class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="top-bar">
        <div class="logo">
          <span class="white">Speed</span><span class="red">BuyCars</span>
        </div>
      </div>

      <div class="form-area">
        <h1>LOGIN TO YOUR ACCOUNT</h1>

        <div class="notice-message" *ngIf="noticeMessage">{{ noticeMessage }}</div>
        <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
        <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>

        <form *ngIf="!showPasscodeBox" (ngSubmit)="sendPasscode()">
          <div class="input-group">
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="Email"
              required
            />
          </div>

          <div class="input-group password-row">
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              placeholder="Password"
              required
            />
            <button type="button" class="toggle-password" (click)="togglePassword()">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>

          <button type="submit" class="login-btn" [disabled]="isLoading">
            {{ isLoading ? 'SENDING...' : 'SEND PASSCODE' }}
          </button>
        </form>

        <form *ngIf="showPasscodeBox" (ngSubmit)="verifyPasscode()" class="passcode-box">
          <div class="input-group">
            <input
              type="text"
              name="passcode"
              [(ngModel)]="passcode"
              placeholder="Enter passcode from your email"
              maxlength="6"
              required
            />
          </div>

          <button type="submit" class="verify-btn" [disabled]="isLoading">
            {{ isLoading ? 'VERIFYING...' : 'VERIFY PASSCODE' }}
          </button>
        </form>

        <div class="bottom-text">
          Don’t have an account?
          <a routerLink="/register">Register Here</a>
        </div>
      </div>
    </div>
  </div>
</div>
