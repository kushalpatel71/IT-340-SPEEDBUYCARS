<header class="site-header">
  <div class="header-shell" [class.with-search]="showSearch">
    <div class="logo" routerLink="/">
      <span class="white">Speed</span><span class="red">BuyCars</span>
    </div>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/inventory" routerLinkActive="active">Inventory</a>
      <a routerLink="/sell-your-car" routerLinkActive="active">Sell Car</a>
      <a routerLink="/payment-options" routerLinkActive="active">Payment Options</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>

    <form *ngIf="showSearch" class="top-search" (ngSubmit)="onSearchSubmit()">
      <input
        type="text"
        [(ngModel)]="searchValue"
        name="headerSearch"
        [placeholder]="searchPlaceholder"
        autocomplete="off"
        (input)="onSearchInput()"
      />
      <button type="submit">Search</button>
    </form>

    <div class="auth-buttons">
      <ng-container *ngIf="!currentUser?.loggedIn; else loggedInBlock">
        <a routerLink="/login" class="login-btn">LOGIN</a>
        <a routerLink="/register" class="register-btn">REGISTER</a>
      </ng-container>

      <ng-template #loggedInBlock>
        <div class="user-box">
          <div class="user-name">👤 {{ currentUser?.fullName }}</div>

          <button class="user-details-btn" type="button" (click)="toggleDropdown()">
            👤 View More Details
          </button>

          <div class="user-dropdown" [class.show]="dropdownOpen">
            <div class="user-detail-line">👤 {{ currentUser?.email }}</div>
            <button class="logout-btn" type="button" (click)="logout()">Logout</button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</header>
